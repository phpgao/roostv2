version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: roost
    binary: roost
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.GitCommit={{ .Commit }}
      - -X main.BuildTime={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - ^docs:
      - ^test:
      - ^ci:
      - ^build:
      - ^style:
      - ^chore:

brews:
  - name: roost
    repository:
      owner: phpgao
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/phpgao/roost"
    description: "AI coding session manager TUI"
    license: MIT
